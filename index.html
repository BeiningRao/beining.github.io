<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bei Ning | GitHub 个人主页</title>
    <link rel="preconnect" href="https://avatars.githubusercontent.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-live="polite">
        <p class="tag">GitHub 个人主页</p>
        <img id="avatar" class="avatar" src="https://avatars.githubusercontent.com/u/0?v=4" alt="GitHub 头像" />
        <h1 id="name">Bei Ning</h1>
        <p id="bio" class="bio">正在加载 GitHub 资料...</p>

        <div class="stats">
          <article>
            <span id="repos">-</span>
            <small>Public Repos</small>
          </article>
          <article>
            <span id="followers">-</span>
            <small>Followers</small>
          </article>
          <article>
            <span id="following">-</span>
            <small>Following</small>
          </article>
        </div>

        <div class="actions">
          <a id="profile-link" href="https://github.com/beining" target="_blank" rel="noreferrer">访问 GitHub</a>
        </div>
        <p id="notice" class="notice"></p>
      </section>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
