<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cosmos" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="warp-glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#4488cc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4488cc" stop-opacity="0"/>
    </radialGradient>
    <filter id="eq-blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Dark elegant background -->
  <rect width="1440" height="500" fill="url(#cosmos)"/>

  <!-- Spacetime curvature grid (General Relativity) — center-left -->
  <g transform="translate(360,250)" opacity="0.2">
    <!-- Warped grid lines - horizontal -->
    <path d="M-200,-100 Q-50,-100 0,-70 Q50,-100 200,-100" stroke="#4488cc" stroke-width="0.7" fill="none"/>
    <path d="M-200,-60 Q-50,-60 0,-20 Q50,-60 200,-60" stroke="#4488cc" stroke-width="0.7" fill="none"/>
    <path d="M-200,-20 Q-50,-20 0,30 Q50,-20 200,-20" stroke="#4488cc" stroke-width="0.8" fill="none"/>
    <path d="M-200,20 Q-50,20 0,80 Q50,20 200,20" stroke="#4488cc" stroke-width="0.8" fill="none"/>
    <path d="M-200,60 Q-80,60 0,130 Q80,60 200,60" stroke="#4488cc" stroke-width="0.7" fill="none"/>
    <path d="M-200,100 Q-100,100 0,160 Q100,100 200,100" stroke="#4488cc" stroke-width="0.6" fill="none"/>
    <!-- Warped grid - vertical -->
    <path d="M-150,-100 Q-150,-20 -140,30 Q-130,60 -150,100" stroke="#4488cc" stroke-width="0.6" fill="none"/>
    <path d="M-80,-100 Q-70,-20 -50,40 Q-40,70 -80,100" stroke="#4488cc" stroke-width="0.7" fill="none"/>
    <path d="M0,-100 Q5,0 0,80 Q-5,120 0,160" stroke="#4488cc" stroke-width="0.8" fill="none"/>
    <path d="M80,-100 Q70,-20 50,40 Q40,70 80,100" stroke="#4488cc" stroke-width="0.7" fill="none"/>
    <path d="M150,-100 Q150,-20 140,30 Q130,60 150,100" stroke="#4488cc" stroke-width="0.6" fill="none"/>
    <!-- Mass causing curvature -->
    <circle cx="0" cy="30" r="15" fill="#4488cc" opacity="0.15" filter="url(#eq-blur)"/>
    <circle cx="0" cy="30" r="5" fill="#6ab0ff" opacity="0.4"/>
  </g>

  <!-- Einstein Field Equations (top area) -->
  <g transform="translate(300,60)" opacity="0.12">
    <text font-family="'Times New Roman', serif" font-size="22" fill="#88bbee" font-style="italic">
      <tspan x="0" y="0">G</tspan>
      <tspan font-size="14" dy="4">μν</tspan>
      <tspan font-size="22" dy="-4"> + Λg</tspan>
      <tspan font-size="14" dy="4">μν</tspan>
      <tspan font-size="22" dy="-4"> = </tspan>
      <tspan font-size="16" dy="0">8πG</tspan>
      <tspan font-size="22" dy="0">/c⁴ </tspan>
      <tspan font-size="22" dy="0">T</tspan>
      <tspan font-size="14" dy="4">μν</tspan>
    </text>
  </g>

  <!-- Standard Model particle table (right side) -->
  <g transform="translate(900,80)" opacity="0.15">
    <!-- Quarks -->
    <g>
      <rect x="0" y="0" width="50" height="50" rx="3" fill="none" stroke="#e85040" stroke-width="0.8"/>
      <text x="25" y="25" fill="#e85040" font-size="16" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">u</text>
      <text x="25" y="47" fill="#e85040" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">up</text>

      <rect x="55" y="0" width="50" height="50" rx="3" fill="none" stroke="#e85040" stroke-width="0.8"/>
      <text x="80" y="25" fill="#e85040" font-size="16" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">c</text>
      <text x="80" y="47" fill="#e85040" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">charm</text>

      <rect x="110" y="0" width="50" height="50" rx="3" fill="none" stroke="#e85040" stroke-width="0.8"/>
      <text x="135" y="25" fill="#e85040" font-size="16" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">t</text>
      <text x="135" y="47" fill="#e85040" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">top</text>

      <rect x="0" y="55" width="50" height="50" rx="3" fill="none" stroke="#e8a040" stroke-width="0.8"/>
      <text x="25" y="80" fill="#e8a040" font-size="16" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">d</text>
      <text x="25" y="102" fill="#e8a040" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">down</text>

      <rect x="55" y="55" width="50" height="50" rx="3" fill="none" stroke="#e8a040" stroke-width="0.8"/>
      <text x="80" y="80" fill="#e8a040" font-size="16" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">s</text>
      <text x="80" y="102" fill="#e8a040" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">strange</text>

      <rect x="110" y="55" width="50" height="50" rx="3" fill="none" stroke="#e8a040" stroke-width="0.8"/>
      <text x="135" y="80" fill="#e8a040" font-size="16" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">b</text>
      <text x="135" y="102" fill="#e8a040" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">bottom</text>
    </g>
    <!-- Leptons -->
    <g>
      <rect x="0" y="115" width="50" height="50" rx="3" fill="none" stroke="#40b8d8" stroke-width="0.8"/>
      <text x="25" y="138" fill="#40b8d8" font-size="14" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">e</text>
      <text x="25" y="160" fill="#40b8d8" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">electron</text>

      <rect x="55" y="115" width="50" height="50" rx="3" fill="none" stroke="#40b8d8" stroke-width="0.8"/>
      <text x="80" y="138" fill="#40b8d8" font-size="14" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">μ</text>
      <text x="80" y="160" fill="#40b8d8" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">muon</text>

      <rect x="110" y="115" width="50" height="50" rx="3" fill="none" stroke="#40b8d8" stroke-width="0.8"/>
      <text x="135" y="138" fill="#40b8d8" font-size="14" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">τ</text>
      <text x="135" y="160" fill="#40b8d8" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">tau</text>

      <rect x="0" y="170" width="50" height="50" rx="3" fill="none" stroke="#60d880" stroke-width="0.8"/>
      <text x="25" y="190" fill="#60d880" font-size="11" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">ν</text>
      <tspan font-size="8">e</tspan>
      <text x="25" y="215" fill="#60d880" font-size="6" font-family="sans-serif" text-anchor="middle" opacity="0.6">e neutrino</text>

      <rect x="55" y="170" width="50" height="50" rx="3" fill="none" stroke="#60d880" stroke-width="0.8"/>
      <text x="80" y="190" fill="#60d880" font-size="11" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">ν</text>
      <text x="80" y="215" fill="#60d880" font-size="6" font-family="sans-serif" text-anchor="middle" opacity="0.6">μ neutrino</text>

      <rect x="110" y="170" width="50" height="50" rx="3" fill="none" stroke="#60d880" stroke-width="0.8"/>
      <text x="135" y="190" fill="#60d880" font-size="11" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">ν</text>
      <text x="135" y="215" fill="#60d880" font-size="6" font-family="sans-serif" text-anchor="middle" opacity="0.6">τ neutrino</text>
    </g>
    <!-- Bosons -->
    <g>
      <rect x="170" y="0" width="50" height="50" rx="3" fill="none" stroke="#d860c0" stroke-width="0.8"/>
      <text x="195" y="25" fill="#d860c0" font-size="14" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">γ</text>
      <text x="195" y="47" fill="#d860c0" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">photon</text>

      <rect x="170" y="55" width="50" height="50" rx="3" fill="none" stroke="#d860c0" stroke-width="0.8"/>
      <text x="195" y="80" fill="#d860c0" font-size="14" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">g</text>
      <text x="195" y="102" fill="#d860c0" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">gluon</text>

      <rect x="170" y="115" width="50" height="50" rx="3" fill="none" stroke="#d860c0" stroke-width="0.8"/>
      <text x="195" y="138" fill="#d860c0" font-size="12" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">W±</text>

      <rect x="170" y="170" width="50" height="50" rx="3" fill="none" stroke="#d860c0" stroke-width="0.8"/>
      <text x="195" y="190" fill="#d860c0" font-size="14" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">Z⁰</text>

      <!-- Higgs -->
      <rect x="230" y="85" width="55" height="55" rx="3" fill="none" stroke="#e8d040" stroke-width="1"/>
      <text x="258" y="112" fill="#e8d040" font-size="18" font-family="serif" text-anchor="middle" dominant-baseline="central" font-style="italic">H</text>
      <text x="258" y="135" fill="#e8d040" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">Higgs</text>
    </g>
  </g>

  <!-- QFT Lagrangian (bottom) -->
  <g transform="translate(100,420)" opacity="0.1">
    <text font-family="'Times New Roman', serif" font-size="18" fill="#aaccee" font-style="italic">
      <tspan x="0" y="0">ℒ = -¼F</tspan>
      <tspan font-size="12" dy="3">μν</tspan>
      <tspan font-size="18" dy="-3">F</tspan>
      <tspan font-size="12" dy="3">μν</tspan>
      <tspan font-size="18" dy="-3"> + iψ̄γ</tspan>
      <tspan font-size="12" dy="3">μ</tspan>
      <tspan font-size="18" dy="-3">D</tspan>
      <tspan font-size="12" dy="3">μ</tspan>
      <tspan font-size="18" dy="-3">ψ + h.c. + |D</tspan>
      <tspan font-size="12" dy="3">μ</tspan>
      <tspan font-size="18" dy="-3">φ|² - V(φ)</tspan>
    </text>
  </g>

  <!-- Metric tensor notation (bottom right) -->
  <g transform="translate(900,440)" opacity="0.08">
    <text font-family="'Times New Roman', serif" font-size="16" fill="#aaccee" font-style="italic">
      <tspan x="0" y="0">ds² = -c²dt² + a²(t)[dr²/(1-kr²) + r²dΩ²]</tspan>
    </text>
  </g>

  <!-- Gravitational wave ripples (bottom left) -->
  <g transform="translate(200,350)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="60" ry="30" fill="none" stroke="#6699cc" stroke-width="0.6"/>
    <ellipse cx="0" cy="0" rx="90" ry="45" fill="none" stroke="#6699cc" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="none" stroke="#6699cc" stroke-width="0.4"/>
    <ellipse cx="0" cy="0" rx="150" ry="75" fill="none" stroke="#6699cc" stroke-width="0.3"/>
    <circle cx="-8" cy="0" r="3" fill="#6699cc" opacity="0.3"/>
    <circle cx="8" cy="0" r="3" fill="#6699cc" opacity="0.3"/>
  </g>

  <!-- Feynman diagram - QED vertex (center bottom) -->
  <g transform="translate(650,370)" opacity="0.12">
    <line x1="0" y1="0" x2="40" y2="30" stroke="#88bbee" stroke-width="1"/>
    <line x1="80" y1="0" x2="40" y2="30" stroke="#88bbee" stroke-width="1"/>
    <!-- Photon wavy line -->
    <path d="M40,30 Q45,40 50,35 Q55,30 60,35 Q65,40 70,35 Q75,30 80,35 Q85,40 90,35 Q95,30 100,35" stroke="#e8d040" stroke-width="0.8" fill="none"/>
    <circle cx="40" cy="30" r="2.5" fill="#88bbee" opacity="0.5"/>
  </g>
</svg>
