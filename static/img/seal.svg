<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 印章外框 -->
  <rect x="8" y="8" width="184" height="184" rx="4" ry="4" fill="none" stroke="#c23a2e" stroke-width="8"/>
  <!-- 内框 -->
  <rect x="20" y="20" width="160" height="160" rx="2" ry="2" fill="none" stroke="#c23a2e" stroke-width="2.5"/>

  <!-- 十字分隔线 -->
  <line x1="100" y1="22" x2="100" y2="178" stroke="#c23a2e" stroke-width="2" opacity="0.5"/>
  <line x1="22" y1="100" x2="178" y2="100" stroke="#c23a2e" stroke-width="2" opacity="0.5"/>

  <!-- 饶 (右上, 小篆风格简化) -->
  <g transform="translate(110, 28)" fill="#c23a2e">
    <!-- 食旁 -->
    <path d="M20,12 L20,6 Q30,2 40,6 L40,12 Q35,16 30,14 Q25,16 20,12Z" stroke="#c23a2e" stroke-width="1.5" fill="none"/>
    <line x1="24" y1="18" x2="24" y2="38" stroke="#c23a2e" stroke-width="2.5"/>
    <path d="M18,22 Q24,20 30,22" stroke="#c23a2e" stroke-width="2" fill="none"/>
    <path d="M18,28 Q24,26 30,28" stroke="#c23a2e" stroke-width="2" fill="none"/>
    <path d="M20,34 Q24,32 28,34" stroke="#c23a2e" stroke-width="1.8" fill="none"/>
    <!-- 尧旁 -->
    <path d="M40,8 Q46,4 52,8 L52,18 Q46,22 40,18Z" stroke="#c23a2e" stroke-width="2" fill="none"/>
    <line x1="42" y1="24" x2="56" y2="24" stroke="#c23a2e" stroke-width="2.5"/>
    <path d="M38,30 Q46,26 54,30 Q54,42 46,46 Q38,42 38,30Z" stroke="#c23a2e" stroke-width="2" fill="none"/>
    <line x1="46" y1="32" x2="46" y2="44" stroke="#c23a2e" stroke-width="1.8"/>
    <!-- 篆刻感笔画装饰 -->
    <path d="M34,48 Q40,52 46,48 Q52,52 58,48" stroke="#c23a2e" stroke-width="2" fill="none"/>
    <path d="M30,56 Q40,60 50,56 Q55,58 60,56" stroke="#c23a2e" stroke-width="2.2" fill="none"/>
    <line x1="44" y1="48" x2="44" y2="62" stroke="#c23a2e" stroke-width="2"/>
  </g>

  <!-- 倍 (右下, 小篆风格简化) -->
  <g transform="translate(110, 106)" fill="#c23a2e">
    <!-- 人旁 -->
    <path d="M22,8 L18,28 M22,8 L28,28" stroke="#c23a2e" stroke-width="2.8" fill="none"/>
    <line x1="16" y1="18" x2="30" y2="18" stroke="#c23a2e" stroke-width="2"/>
    <!-- 咅旁 -->
    <path d="M38,6 L56,6 L56,20 L38,20Z" stroke="#c23a2e" stroke-width="2.2" fill="none"/>
    <line x1="47" y1="6" x2="47" y2="20" stroke="#c23a2e" stroke-width="1.5"/>
    <line x1="38" y1="13" x2="56" y2="13" stroke="#c23a2e" stroke-width="1.5"/>
    <path d="M36,26 Q47,22 58,26" stroke="#c23a2e" stroke-width="2.2" fill="none"/>
    <path d="M34,32 L60,32 L58,48 Q47,52 36,48Z" stroke="#c23a2e" stroke-width="2" fill="none"/>
    <line x1="47" y1="32" x2="47" y2="50" stroke="#c23a2e" stroke-width="1.8"/>
    <line x1="36" y1="40" x2="58" y2="40" stroke="#c23a2e" stroke-width="1.5"/>
    <!-- 底部装饰 -->
    <path d="M32,56 Q47,60 62,56" stroke="#c23a2e" stroke-width="2" fill="none"/>
  </g>

  <!-- 宁 (左上, 小篆风格简化) -->
  <g transform="translate(30, 28)" fill="#c23a2e">
    <!-- 宀 -->
    <path d="M32,6 L12,20 L52,20" stroke="#c23a2e" stroke-width="2.8" fill="none" stroke-linejoin="round"/>
    <!-- 心 -->
    <path d="M20,28 Q20,34 26,36 Q32,34 32,28" stroke="#c23a2e" stroke-width="2.2" fill="none"/>
    <circle cx="26" cy="30" r="1.5" fill="#c23a2e"/>
    <!-- 丁 -->
    <line x1="16" y1="42" x2="48" y2="42" stroke="#c23a2e" stroke-width="2.8"/>
    <line x1="32" y1="42" x2="32" y2="62" stroke="#c23a2e" stroke-width="2.8"/>
    <!-- 装饰笔画 -->
    <path d="M24,50 Q32,48 40,50" stroke="#c23a2e" stroke-width="1.8" fill="none"/>
  </g>

  <!-- 印 (左下, 小篆风格简化) -->
  <g transform="translate(30, 106)" fill="#c23a2e">
    <!-- 左半 爪 -->
    <path d="M18,10 L18,40" stroke="#c23a2e" stroke-width="2.8"/>
    <path d="M12,10 Q18,6 24,10" stroke="#c23a2e" stroke-width="2.2" fill="none"/>
    <path d="M14,20 L24,20" stroke="#c23a2e" stroke-width="2"/>
    <path d="M14,30 L24,30" stroke="#c23a2e" stroke-width="2"/>
    <!-- 右半 卩 -->
    <path d="M34,8 L50,8 L50,46 Q42,50 34,46Z" stroke="#c23a2e" stroke-width="2.5" fill="none"/>
    <line x1="42" y1="8" x2="42" y2="46" stroke="#c23a2e" stroke-width="2"/>
    <line x1="34" y1="26" x2="50" y2="26" stroke="#c23a2e" stroke-width="1.8"/>
    <!-- 底部 -->
    <path d="M16,48 Q34,54 52,48" stroke="#c23a2e" stroke-width="2.2" fill="none"/>
    <path d="M22,56 Q34,60 46,56" stroke="#c23a2e" stroke-width="2" fill="none"/>
  </g>

  <!-- 印章做旧效果 - 随机缺损点 -->
  <g opacity="0.15">
    <circle cx="15" cy="25" r="4" fill="#faf6ef"/>
    <circle cx="185" cy="170" r="3" fill="#faf6ef"/>
    <circle cx="45" cy="185" r="5" fill="#faf6ef"/>
    <circle cx="160" cy="15" r="3.5" fill="#faf6ef"/>
    <circle cx="90" cy="10" r="2.5" fill="#faf6ef"/>
    <circle cx="12" cy="120" r="3" fill="#faf6ef"/>
    <circle cx="175" cy="85" r="4" fill="#faf6ef"/>
    <circle cx="55" cy="12" r="2" fill="#faf6ef"/>
    <circle cx="145" cy="188" r="3" fill="#faf6ef"/>
    <rect x="8" y="95" width="6" height="3" fill="#faf6ef" rx="1"/>
    <rect x="186" y="45" width="4" height="5" fill="#faf6ef" rx="1"/>
    <rect x="100" y="186" width="8" height="4" fill="#faf6ef" rx="1"/>
  </g>
</svg>
